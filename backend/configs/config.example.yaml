# Podman Manager Configuration
# Copy this to config.yaml and update with your host details.

server:
  # Port for the REST API server
  port: 18734
  # Bind address: 127.0.0.1 for local-only (Unraid plugin), 0.0.0.0 for container
  bind: "127.0.0.1"

ssh:
  # Path to the SSH private key (ed25519 recommended)
  key_path: "~/.ssh/id_ed25519"
  # Connection timeout per host
  connect_timeout: "5s"
  # Keepalive interval to prevent SSH drops
  keepalive_interval: "30s"

# Podman hosts to manage
hosts:
  - name: "host-alpha"
    address: "10.0.0.101"
    port: 22
    user: "your-user"
    # rootful = uses 'sudo podman', rootless = uses 'podman' directly
    mode: "rootful"

  - name: "host-beta"
    address: "10.0.0.102"
    port: 22
    user: "your-user"
    mode: "rootful"

  - name: "host-gamma"
    address: "10.0.0.103"
    port: 22
    user: "your-user"
    mode: "rootless"
