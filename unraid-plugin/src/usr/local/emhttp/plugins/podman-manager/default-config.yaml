server:
  port: 18734
  bind: "127.0.0.1"

ssh:
  key_path: "/boot/config/plugins/podman-manager/id_ed25519"
  connect_timeout: "5s"
  keepalive_interval: "30s"
  strict_host_key_checking: "accept-new"

cache_ttl: "3s"
enable_events_stream: true

auth:
  enabled: false
  username: "admin"
  password_hash: ""
  session_ttl: "12h"

hosts: []
