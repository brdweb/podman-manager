name: Release Podman Manager

on:
  push:
    tags:
      - 'v20*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (YYYY.MM.DD format, e.g., 2026.03.20)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  RAW_VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Normalize release version
        run: |
          VERSION="${RAW_VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build backend binary
        run: |
          cd backend
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ env.VERSION }}" -o bin/podman-manager-linux-amd64 ./cmd/podman-manager

      - name: Build agent binary
        run: |
          cd agent
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ env.VERSION }}" -o bin/podman-agent-linux-amd64 ./cmd/agent

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push manager Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./webapp/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/brdweb/podman-manager:latest
            ghcr.io/brdweb/podman-manager:${{ env.VERSION }}

      - name: Build and push agent Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./agent/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/brdweb/podman-manager/agent:latest
            ghcr.io/brdweb/podman-manager/agent:${{ env.VERSION }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.VERSION }}
          body: |
            ## Podman Manager ${{ env.VERSION }}
            
            ### Changes
            - Snapshot cache with configurable TTL (reduces SSH polling)
            - WebSocket event streaming for real-time container updates
            - SSH host key verification (strict/accept-new/off modes)
            - Container removal with force option
            - Image management (list, pull, remove, prune)
            - Real-time log streaming via WebSocket
            - Version display in webapp header
            - Structured JSON logging (slog)
            
            ### Downloads
            - **Manager image**: `ghcr.io/brdweb/podman-manager:${{ env.VERSION }}` or `ghcr.io/brdweb/podman-manager:latest`
            - **Agent image**: `ghcr.io/brdweb/podman-manager/agent:${{ env.VERSION }}` or `ghcr.io/brdweb/podman-manager/agent:latest`
            - **Backend binary**: `podman-manager-linux-amd64`
            - **Agent binary**: `podman-agent-linux-amd64`
          files: |
            backend/bin/podman-manager-linux-amd64
            agent/bin/podman-agent-linux-amd64
          draft: false
          prerelease: false
