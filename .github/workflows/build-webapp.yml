name: Build Podman Manager Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-webapp.yml"
      - "agent/**"
      - "backend/**"
      - "deploy/**"
      - "go.work"
      - "go.work.sum"
      - "webapp/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push manager image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./webapp/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ghcr.io/brdweb/podman-manager:latest
            ghcr.io/brdweb/podman-manager:${{ github.sha }}

      - name: Build and push agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./agent/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ghcr.io/brdweb/podman-manager/agent:latest
            ghcr.io/brdweb/podman-manager/agent:${{ github.sha }}
